name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn compile -q -f ZQ_plat/pom.xml

      - name: Test
        run: mvn test -f ZQ_plat/pom.xml

  frontend:
    name: Frontend Build
    if: hashFiles('front_ZQ/intelliengine-frontend/package.json') != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: front_ZQ/intelliengine-frontend/package-lock.json

      - run: npm ci
        working-directory: front_ZQ/intelliengine-frontend

      - run: npm run build
        working-directory: front_ZQ/intelliengine-frontend
