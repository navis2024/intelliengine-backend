# ============================================================================
# 智擎后端应用 - 主配置文件
# ============================================================================

server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: intelliengine-backend
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:intelliengine}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:IntelliEngine@2025}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: ${RABBITMQ_PASSWORD:IntelliEngine@2025}
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000ms
        default-requeue-rejected: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.aigc.intelliengine
  global-config:
    db-config:
      # 逻辑删除字段配置 - 对应user_account表的is_deleted字段
      logic-delete-field: isDeleted
      logic-not-delete-value: 0
      logic-delete-value: 1
      # ID策略 - 使用数据库自增
      id-type: auto
      # 表前缀 - user_account没有前缀
      table-prefix: ""
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.aigc.intelliengine: DEBUG
    com.baomidou.mybatisplus: DEBUG
    org.mybatis: DEBUG

# MinIO配置
minio:
  endpoint: http://localhost:9000
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:IntelliEngine@2025}
  bucket: jimeng

# LLM配置 (OpenAI兼容接口)
llm:
  enabled: false
  provider: openai
  api-key: ${LLM_API_KEY:sk-your-api-key-here}
  base-url: https://api.openai.com
  model: gpt-4o-mini
  temperature: 0.7
  max-tokens: 512

# LangChain4j配置 (Agent增强 — 支持ChatMemory + Function Calling)
langchain4j:
  enabled: false
  api-key: ${LANGCHAIN4J_API_KEY:${LLM_API_KEY:sk-your-api-key-here}}
  base-url: https://api.openai.com
  model-name: gpt-4o-mini
  temperature: 0.7
  max-tokens: 512
  max-memory-messages: 10

# JWT配置
jwt:
  secret: ${JWT_SECRET:IntelliEngineSecretKey2024ForAIGCAssetManagementPlatformNavis}
  expiration: 604800000  # 7天(毫秒)
  header: Authorization
  prefix: "Bearer "
