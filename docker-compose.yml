# 智擎(IntelliEngine) - Docker Compose 配置
# 一键启动完整应用环境

version: '3.8'

services:
  # ==================== 后端服务 ====================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intelliengine-backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      # 数据库配置
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/intelliengine?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
      - SPRING_DATASOURCE_USERNAME=intelliengine
      - SPRING_DATASOURCE_PASSWORD=IntelliEngine@2024
      # Redis 配置
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=Redis@2024
      # JWT 配置
      - JWT_SECRET=${JWT_SECRET:-IntelliEngineSecretKey2024ForAIGCAssetManagementPlatformNavis}
      - JWT_EXPIRATION=604800000
      # 日志级别
      - LOGGING_LEVEL_ROOT=INFO
      - LOGGING_LEVEL_COM_AIGC_INTELLIENGINE=INFO
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - intelliengine-network
    volumes:
      - ./logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0.36
    container_name: intelliengine-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=Root@2024
      - MYSQL_DATABASE=intelliengine
      - MYSQL_USER=intelliengine
      - MYSQL_PASSWORD=IntelliEngine@2024
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - /etc/localtime:/etc/localtime:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=500
      --innodb-buffer-pool-size=512M
    networks:
      - intelliengine-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pRoot@2024"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7.2-alpine
    container_name: intelliengine-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --requirepass Redis@2024
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
      - /etc/localtime:/etc/localtime:ro
    networks:
      - intelliengine-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Redis@2024", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ==================== Nginx 反向代理 ====================
  nginx:
    image: nginx:1.25-alpine
    container_name: intelliengine-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - backend
    networks:
      - intelliengine-network

# ==================== 存储卷 ====================
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

# ==================== 网络 ====================
networks:
  intelliengine-network:
    driver: bridge
    name: intelliengine-network
