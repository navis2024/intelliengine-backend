# ============================================================================
# 智摩后端应用 - 主配置文件
# ============================================================================

server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: intelliengine-backend
  datasource:
    url: jdbc:mysql://localhost:3307/intelliengine?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: IntelliEngine@2025
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.aigc.intelliengine.**.infrastructure.dataobject
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-not-delete-value: 0
      logic-delete-value: 1
      id-type: assign_id
      table-prefix: t_
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.aigc.intelliengine: DEBUG
